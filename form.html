<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            padding: 50px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header p {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .header h1 {
            color: #1a202c;
            font-size: 42px;
            margin-bottom: 10px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #4a5568;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .success-message {
            display: none;
            background: #48bb78;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .error-message {
            display: none;
            background: #f56565;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <p>CONTACT US</p>
            <h1>Get in touch with us</h1>
        </div>

        <div id="successMessage" class="success-message">
            ✓ Form successfully submitted! We'll contact you soon.
        </div>

        <div id="errorMessage" class="error-message">
            ✗ Please fill all required fields correctly!
        </div>

        <!-- METHOD 1: FormSubmit.co (Recommended - Sabse Easy) -->
        <!-- Apna email yahan dalein YOUR_EMAIL@example.com ki jagah -->
        <div id="contactForm" action="https://formsubmit.co/sharma311312@gmail.com" method="POST">
            
            <!-- FormSubmit Settings -->
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_next" value="https://yourdomain.com/thankyou.html">
            <input type="text" name="_honey" style="display:none">

            <div class="form-row">
                <div class="form-group">
                    <label>Your Name *</label>
                    <input type="text" name="name" id="name" placeholder="Enter Your Name" required>
                </div>

                <div class="form-group">
                    <label>Your Email *</label>
                    <input type="email" name="email" id="email" placeholder="Enter Your Email" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" name="phone" id="phone" placeholder="Enter Phone Number" required>
                </div>

                <div class="form-group">
                    <label>Subject *</label>
                    <input type="text" name="subject" id="subject" placeholder="Subject" required>
                </div>
            </div>

            <div class="form-group">
                <label>Your Message *</label>
                <textarea name="message" id="message" placeholder="Message" required></textarea>
            </div>

            <button type="button" class="submit-btn" onclick="submitForm()">Submit</button>
        </div>
    </div>

    <script>
        function submitForm() {
            // Get form values
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const subject = document.getElementById('subject').value.trim();
            const message = document.getElementById('message').value.trim();

            // Validation
            if (!name || !email || !phone || !subject || !message) {
                showError();
                return;
            }

            // Email validation
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                showError();
                return;
            }

            // Show success message
            showSuccess();

            // Send email using FormSubmit
            const formData = new FormData();
            formData.append('name', name);
            formData.append('email', email);
            formData.append('phone', phone);
            formData.append('subject', subject);
            formData.append('message', message);
            formData.append('_captcha', 'false');

            fetch('https://formsubmit.co/sharma311312@gmail.com', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    // Clear form
                    document.getElementById('contactForm').reset();
                }
            })
            .catch(error => {
                console.error('Error:', error);
            });
        }

        function showSuccess() {
            const success = document.getElementById('successMessage');
            const error = document.getElementById('errorMessage');
            success.style.display = 'block';
            error.style.display = 'none';

            setTimeout(() => {
                success.style.display = 'none';
            }, 5000);
        }

        function showError() {
            const success = document.getElementById('successMessage');
            const error = document.getElementById('errorMessage');
            error.style.display = 'block';
            success.style.display = 'none';

            setTimeout(() => {
                error.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
